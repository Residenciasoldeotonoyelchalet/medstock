<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5c3d1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedStock">
<link rel="manifest" href="/medstock/manifest.json">
<title>MedStock – Residencia Sol de Otoño y El Chalet</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f2;
    --amber: #d4883a;
    --amber-light: #f0b060;
    --amber-dark: #a05e20;
    --brown: #5c3d1e;
    --brown-light: #8a6040;
    --green: #4a7c59;
    --green-light: #e8f4ec;
    --red: #c0392b;
    --red-light: #fdecea;
    --yellow: #e6a817;
    --yellow-light: #fef9e7;
    --blue: #2c6fad;
    --blue-light: #e8f0fb;
    --text: #2d1f0e;
    --text-muted: #7a5c40;
    --border: #e8d8c4;
    --shadow: 0 2px 16px rgba(92,61,30,0.10);
    --shadow-lg: 0 8px 40px rgba(92,61,30,0.16);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ====== LOGIN ====== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fdf3e3 0%, #f5e6d0 50%, #eeddc0 100%);
    padding: 20px;
  }

  .login-card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo .icon {
    font-size: 52px;
    display: block;
    margin-bottom: 12px;
  }

  .login-logo h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    color: var(--brown);
    font-weight: 700;
    line-height: 1.2;
  }

  .login-logo p {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--brown);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--warm-white);
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--amber);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--amber);
    color: white;
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
  }

  .btn-primary:hover { background: var(--amber-dark); }

  .btn-secondary {
    background: var(--border);
    color: var(--brown);
  }

  .btn-secondary:hover { background: #d8c4a8; }

  .btn-green {
    background: var(--green);
    color: white;
  }

  .btn-green:hover { background: #3a6347; }

  .btn-red {
    background: var(--red);
    color: white;
  }

  .btn-red:hover { background: #a93226; }

  .btn-sm {
    padding: 7px 14px;
    font-size: 13px;
  }

  .login-error {
    background: var(--red-light);
    color: var(--red);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }

  /* ====== APP SHELL ====== */
  #app { display: none; min-height: 100vh; background: var(--cream); }

  .topbar {
    background: var(--brown);
    color: white;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
  }

  .topbar-brand span { font-size: 22px; }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }

  .user-badge {
    background: rgba(255,255,255,0.15);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
  }

  .btn-logout {
    background: rgba(255,255,255,0.15);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }

  .btn-logout:hover { background: rgba(255,255,255,0.25); }

  .nav-tabs {
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
  }

  .nav-tab {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-tab:hover { color: var(--amber); }
  .nav-tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  .main-content { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }

  /* ====== CARDS ====== */
  .card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--brown);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body { padding: 20px 22px; }

  /* ====== STATS ====== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--brown); font-family: 'Fraunces', serif; }
  .stat-card .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* ====== TABLE ====== */
  .table-wrapper { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }

  th {
    background: var(--cream);
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--warm-white); }

  /* ====== BADGES ====== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-ok { background: var(--green-light); color: var(--green); }
  .badge-low { background: var(--yellow-light); color: var(--yellow); }
  .badge-out { background: var(--red-light); color: var(--red); }
  .badge-role { background: var(--blue-light); color: var(--blue); }
  .badge-unica      { background: #e8f0fb; color: #2c6fad; }
  .badge-evaluar    { background: #f0e8fb; color: #6b2cad; }
  .badge-finalizado { background: #ececec; color: #888; }
  .badge-mensual    { background: #fff0e0; color: #c87000; }
  .badge-higiene    { background: #e8f7ee; color: #2e7d4f; }
  .badge-vence      { background: #fff3cd; color: #856404; }
  .badge-vencido    { background: #fdecea; color: #c0392b; }

  .dosis-btn {
    flex: 1;
    padding: 10px 0;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--warm-white);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .dosis-btn:hover { border-color: var(--amber); color: var(--amber); }
  .dosis-btn.active { background: var(--amber); border-color: var(--amber); color: white; }
  .badge-unica { background: #e8f0fb; color: #2c6fad; }
  .badge-evaluar { background: #f0e8fb; color: #6b2cad; }

  /* Install banner */
  #install-banner {
    display: none;
    background: var(--brown);
    color: white;
    padding: 12px 20px;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 14px;
    flex-wrap: wrap;
  }
  #install-banner.show { display: flex; }
  #install-banner .install-text { display:flex; align-items:center; gap:8px; }
  #install-banner button {
    background: var(--amber);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  #install-banner .dismiss {
    background: transparent;
    color: rgba(255,255,255,0.6);
    padding: 4px 8px;
    font-size: 18px;
  }

  /* ====== PROGRESS BAR ====== */
  .progress-bar {
    background: var(--border);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
    min-width: 80px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s;
  }

  .fill-ok { background: var(--green); }
  .fill-low { background: var(--yellow); }
  .fill-out { background: var(--red); }

  /* ====== MODAL ====== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }

  .modal {
    background: white;
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--brown);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  /* ====== ALERTS ====== */
  .alert-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    font-size: 14px;
  }

  .alert-low { background: var(--yellow-light); border-left: 4px solid var(--yellow); }
  .alert-out { background: var(--red-light); border-left: 4px solid var(--red); }

  /* ====== SEARCH ====== */
  .search-bar {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--warm-white);
    outline: none;
  }

  .search-bar input:focus { border-color: var(--amber); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
  }

  /* ====== RESIDENT LIST ====== */
  .resident-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .resident-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .resident-card:hover {
    border-color: var(--amber);
    box-shadow: 0 4px 20px rgba(212,136,58,0.15);
    transform: translateY(-2px);
  }

  .resident-name {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--brown);
    margin-bottom: 8px;
  }

  .resident-meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* ====== MOVEMENTS ====== */
  .movement-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    align-items: flex-start;
  }

  .movement-item:last-child { border-bottom: none; }

  .movement-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .mov-in { background: var(--green-light); }
  .mov-out { background: var(--red-light); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--brown);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag {
    display: inline-block;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--brown);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    display: none;
    z-index: 9999;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 16px;
    padding: 4px 0;
  }

  .back-btn:hover { color: var(--amber); }

  @media (max-width: 768px) {
    .main-content { padding: 16px; }
    .login-card { padding: 32px 24px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .modal { padding: 24px 20px; }
  }

  /* ====== PRINT ====== */
  @media print {
    @page { margin: 20mm 18mm 18mm 18mm; size: A4; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; box-sizing: border-box; }

    body > *:not(#print-area) { display: none !important; }
    #print-area {
      display: block !important;
      font-family: 'DM Sans', sans-serif;
      color: #1a1a1a;
      font-size: 11px;
      line-height: 1.5;
    }

    /* ── BANDA SUPERIOR ── */
    .print-topband {
      background: #5c3d1e !important;
      color: #fff !important;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
      border-radius: 6px 6px 0 0;
    }
    .print-topband .print-institution {
      font-family: 'Fraunces', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #fff !important;
    }
    .print-topband .print-subtitle {
      font-size: 9px;
      color: rgba(255,255,255,0.7) !important;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .print-topband .print-fecha {
      font-size: 10px;
      color: rgba(255,255,255,0.85) !important;
      text-align: right;
      line-height: 1.6;
    }
    .print-topband .print-fecha strong {
      display: block;
      font-size: 12px;
      color: #fff !important;
    }

    /* ── BLOQUE RESIDENTE ── */
    .print-resident-block {
      background: #faf7f2 !important;
      border: 1px solid #e8d8c4;
      border-top: none;
      padding: 14px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-radius: 0 0 6px 6px;
    }
    .print-resident-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #5c3d1e !important;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .print-resident-block .print-label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #7a5c40;
      margin-bottom: 2px;
    }
    .print-resident-block .print-name {
      font-size: 18px;
      font-weight: 700;
      color: #2d1f0e;
      font-family: 'Fraunces', serif;
      line-height: 1.2;
    }

    /* ── TABLA ── */
    .print-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10.5px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: none;
    }
    .print-table thead tr { background: #3d2810 !important; }
    .print-table th {
      background: #3d2810 !important;
      color: #fff !important;
      font-size: 8.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 10px 12px;
      text-align: left;
      border: none;
      white-space: nowrap;
    }
    .print-table tbody tr { border-bottom: 1px solid #ede0d0; }
    .print-table tbody tr:nth-child(even) td { background: #fdf8f3 !important; }
    .print-table tbody tr:nth-child(odd)  td { background: #ffffff !important; }
    .print-table td {
      padding: 10px 12px;
      vertical-align: middle;
      color: #1a1a1a;
      border: none;
    }
    .print-table tr:last-child td { border-bottom: none; }

    .med-name { font-weight: 700; font-size: 11px; color: #2d1f0e; }
    .med-sub  { font-size: 9px; color: #8a6040; display: block; margin-top: 2px; }
    .sos-tag  { font-size: 8px; color: #7a4800; font-weight: 700; background: #fde8b0 !important; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-top: 2px; }

    .horario-pill {
      display: inline-block;
      background: #e8f0fb !important;
      color: #1a4a8a;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 700;
      margin: 1px 2px;
    }

    .status-ok  { color: #1a6b3c !important; font-weight: 700; }
    .status-low { color: #7a4f00 !important; font-weight: 700; }
    .status-out { color: #b52a1c !important; font-weight: 700; }

    /* ── SECCIÓN FIRMA ── */
    .print-firma {
      display: flex;
      gap: 24px;
      margin-top: 36px;
    }
    .print-firma-box {
      flex: 1;
      padding-top: 36px;
      border-top: 1.5px solid #bbb;
      font-size: 8.5px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-align: center;
    }

    /* ── PIE ── */
    .print-footer {

function doLogin(savedUser = null) {
  // Si los usuarios todavía no cargaron desde Firestore, esperar
  if (!usersLoaded) {
    if (!savedUser) {
      const errEl = document.getElementById('login-error');
      errEl.textContent = '⏳ Conectando... intentá de nuevo en un momento';
      errEl.style.display = 'block';
    }
    return;
  }
  let found;
  if (savedUser) {
    found = USERS.find(x => x.user === savedUser.user && x.pass === savedUser.pass);
  } else {
    const u = document.getElementById('login-user').value.trim().toLowerCase();
    const p = document.getElementById('login-pass').value;
    found = USERS.find(x => x.user === u && x.pass === p);
  }
  if (!found) {
    if (!savedUser) {
      const errEl = document.getElementById('login-error');
      errEl.textContent = 'Usuario o contraseña incorrectos';
      errEl.style.display = 'block';
    }
    return;
  }
  currentUser = found;
  window.currentUser = found;
  // Guardar sesión en localStorage
  localStorage.setItem('medstock_session', JSON.stringify({ user: found.user, pass: found.pass }));
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = found.name + ' · ' + ROLE_LABELS[found.role];
  buildNav();
  renderTab('home');
}

// Restaurar sesión al cargar la página
function tryRestoreSession() {
  try {
    const saved = localStorage.getItem('medstock_session');
    if (!saved) return;
    const parsed = JSON.parse(saved);
    if (usersLoaded) {
      doLogin(parsed);
    } else {
      // Esperar a que Firestore cargue los usuarios (máx 5 seg)
      let intentos = 0;
      const retry = setInterval(() => {
        intentos++;
        if (usersLoaded) {
          clearInterval(retry);
          doLogin(parsed);
        } else if (intentos >= 25) {
          clearInterval(retry);
          console.warn('Timeout esperando usuarios de Firestore');
        }
      }, 200);
    }
  } catch(e) { localStorage.removeItem('medstock_session'); }
}

// ── HELPERS HIGIENE ──
const ARTICULOS_MENSUALES = [
  'Shampoo','Caja de guantes','Alcohol','Acondicionador','Jabón de tocador',
  'Pasta dental','Repelente','Crema corporal','Crema para manos','Jabón blanco',
  'Corega','Cepillo de dientes','Desodorante','Perfume'
];
const ARTICULOS_NECESIDAD = [
  'Pañales','Apósitos','Gasas','Solución fisiológica','Cinta hipoalérgica',
  'Máquinas de afeitar','Podóloga','Peluquera'
];

function getHygieneStatus(item) {
  if (item.tipo === 'mensual') {
    if (!item.fechaEntrega) return 'pendiente';
    const entrega = new Date(item.fechaEntrega + 'T00:00:00');
    const vence = new Date(entrega);
    vence.setMonth(vence.getMonth() + 1);
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const diasHastaVence = Math.floor((vence - hoy) / (1000*60*60*24));
    if (diasHastaVence < 0) return 'vencido';
    if (diasHastaVence <= 7) return 'por-vencer';
    return 'ok';
  } else {
    // necesidad: igual que medicamentos
    if (item.qty <= 0) return 'out';
    if (item.qty <= (item.minQty || 5)) return 'low';
    return 'ok';
  }
}

function getHygieneStatusLabel(st) {
  if (st === 'ok')        return '✅ OK';
  if (st === 'por-vencer') return '⚠️ Vence pronto';
  if (st === 'vencido')   return '🔴 Vencido';
  if (st === 'pendiente') return '📋 Sin registrar';
  if (st === 'low')       return '⚠️ Stock bajo';
  if (st === 'out')       return '🚨 Sin stock';
  return '';
}

function getHygieneBadgeClass(st) {
  if (st === 'ok')        return 'badge-ok';
  if (st === 'por-vencer') return 'badge-vence';
  if (st === 'vencido')   return 'badge-out';
  if (st === 'pendiente') return 'badge-low';
  if (st === 'low')       return 'badge-low';
  if (st === 'out')       return 'badge-out';
  return 'badge-ok';
}

// ── HELPERS DE FRECUENCIA ──
function debeTomarsHoy(med) {
  if (!med.frecuencia || med.frecuencia === 'diario') return true;
  const hoy = new Date();
  const diasSemana = ['dom','lun','mar','mie','jue','vie','sab'];
  const diaHoy = diasSemana[hoy.getDay()];
  if (med.frecuencia === 'alternos') {
    const inicio = med.fechaInicio ? new Date(med.fechaInicio) : new Date();
    const diffDias = Math.floor((hoy - inicio) / (1000*60*60*24));
    return diffDias % 2 === 0;
  }
  if (med.frecuencia === 'especificos') return (med.diasSemana || []).includes(diaHoy);
  if (med.frecuencia === 'cada_x_dias') {
    const inicio = med.fechaInicio ? new Date(med.fechaInicio) : new Date();
    const diffDias = Math.floor((hoy - inicio) / (1000*60*60*24));
    return diffDias % (med.cadaXDias || 1) === 0;
  }
  return true;
}

function getDosisdiaria(med) {
  const horarios = normalizarHorarios(med);
  if (horarios.length > 0) return horarios.reduce((sum, h) => sum + h.dosis, 0);
  return med.dailyDose || 0;
}

// Normaliza horarios al formato [{hora, dosis}] sin importar cómo vengan de Firebase
function normalizarHorarios(med) {
  if (!med.horarios || med.horarios.length === 0) return [];
  return med.horarios.map(h => {
    if (h && typeof h === 'object' && h.hora) return { hora: h.hora, dosis: parseFloat(h.dosis) || med.dailyDose || 1 };
    if (typeof h === 'string' && h.length > 0) return { hora: h, dosis: med.dailyDose || 1 };
    return null;
  }).filter(Boolean);
}

function getHorasArray(med) {
  return normalizarHorarios(med).map(h => h.hora);
}

function calcDiasCalendario(med) {
  const dosisdiaria = getDosisdiaria(med);
  if (dosisdiaria <= 0) return 0;
  let unidadesPorDia;
  if (!med.frecuencia || med.frecuencia === 'diario') unidadesPorDia = dosisdiaria;
  else if (med.frecuencia === 'alternos') unidadesPorDia = dosisdiaria / 2;
  else if (med.frecuencia === 'especificos') {
    const dias = (med.diasSemana || []).length || 1;
    unidadesPorDia = (dosisdiaria * dias) / 7;
  } else if (med.frecuencia === 'cada_x_dias') unidadesPorDia = dosisdiaria / (med.cadaXDias || 1);
  else unidadesPorDia = dosisdiaria;
  if (unidadesPorDia <= 0) return 0;
  return Math.floor(med.qty / unidadesPorDia);
}

function frecuenciaLabel(med) {
  if (med.sos) return 'Según necesidad';
  if (!med.frecuencia || med.frecuencia === 'diario') return 'Todos los días';
  if (med.frecuencia === 'alternos') return 'Días alternos';
  if (med.frecuencia === 'cada_x_dias') return `Cada ${med.cadaXDias || '?'} días`;
  if (med.frecuencia === 'especificos') {
    const labels = {lun:'Lun',mar:'Mar',mie:'Mié',jue:'Jue',vie:'Vie',sab:'Sáb',dom:'Dom'};
    return (med.diasSemana || []).map(d => labels[d] || d).join(', ');
  }
  return '';
}

    return st !== 'ok';
  }).filter(h => !currentUser.residentId || h.residentId === currentUser.residentId);

  if (alerts.length === 0 && hygieneAlertsList.length === 0) return `<div class="card"><div class="card-body" style="text-align:center;padding:24px;color:var(--green)">✅ Todo en buen estado</div></div>`;
  return `<div class="card">
    <div class="card-header"><div class="card-title">🔔 Alertas</div></div>
    <div class="card-body">
      ${alerts.map(m => {
        const res = RESIDENTS.find(r => r.id === m.residentId);
        const st = getStatus(m);
        return `<div class="alert-item ${st === 'out' ? 'alert-out' : 'alert-low'}">
          <span>${st === 'out' ? '🚨' : '⚠️'}</span>
          <div><strong>${m.name}</strong> ${m.drug ? `(${m.drug})` : ''} — ${res ? res.name : ''}<br>
          <span style="font-size:13px">💊 ${st === 'out' ? 'Sin stock' : `Stock bajo: ${m.qty} ${m.unit} restantes`}</span></div>
        </div>`;
      }).join('')}
      ${hygieneAlertsList.map(h => {
        const res = RESIDENTS.find(r => r.id === h.residentId);
        const st = getHygieneStatus(h);
        const isUrgent = st === 'out' || st === 'vencido';
        return `<div class="alert-item ${isUrgent ? 'alert-out' : 'alert-low'}">
          <span>${isUrgent ? '🚨' : '⚠️'}</span>
          <div><strong>${h.nombre}</strong> — ${res ? res.name : ''}<br>
          <span style="font-size:13px">🧴 ${getHygieneStatusLabel(st)}</span></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function getStatus(m) {
  // Fecha de fin
  if (m.fechaFin) {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fin = new Date(m.fechaFin + 'T00:00:00');
    if (hoy > fin) return 'finalizado';
  }
  // Única toma nunca genera alarma; A evaluar sí muestra sin stock si llega a 0
  if (m.treatment === 'unica') return 'ok';
  if (m.treatment === 'evolucion') return m.qty <= 0 ? 'out' : 'ok';
  if (m.sos) return m.qty <= 0 ? 'out' : 'ok';
  if (m.qty <= 0) return 'out';
  const minDays = m.minDays || 7;
  // Porcentaje
  if (m.unit === '%') {
    if (m.qty <= 20) return 'low';
    return 'ok';
  }
  const dosis = getDosisdiaria(m);
  if (dosis > 0) {
    const dias = calcDiasCalendario(m);
    if (dias <= minDays) return 'low';
  } else {
    if (m.qty <= minDays) return 'low';
  }
  return 'ok';
}

function registerTake(mid) {
  const med = medications.find(m => m.id === mid);
  if (!med) return;

  const dosisHoy = getDosisdiaria(med);
  if (med.qty < dosisHoy) {
    alert("⚠️ No hay stock suficiente para la dosis de hoy (" + dosisHoy + " " + med.unit + ")");
    return;
  }

  med.qty = Math.max(0, med.qty - dosisHoy);

  movements.push({
    id: Date.now(),
    medId: mid,
    medName: med.name,
    residentId: med.residentId,
    type: 'out',
    qty: dosisHoy,
    unit: med.unit,
    date: new Date().toLocaleString(),
    by: currentUser.name,
    note: 'Toma registrada por enfermería'
  });

  saveMeds(med.id);
  saveMovs();
  showResident(med.residentId);
  showToast("✅ Toma de " + med.name + " registrada");
}

      </div>
    </div>

    </div>
  `);

function toggleFamilyField() {
  const role = document.getElementById('u-role').value;
  const field = document.getElementById('family-field');
  if (field) field.style.display = role === 'family' ? 'block' : 'none';
}

function saveUser(originalUsername) {
  const name = document.getElementById('u-name').value.trim();
  const role = document.getElementById('u-role').value;
  const username = document.getElementById('u-user').value.trim().toLowerCase();
  const pass = document.getElementById('u-pass').value.trim();

  if (!name || !username) { showToast('Completá nombre y usuario'); return; }
  if (!pass && !originalUsername) { showToast('Ingresá una contraseña'); return; }

  // Verificar que el username no esté en uso por otro usuario
  const duplicate = USERS.find(u => u.user === username && u.user !== originalUsername);
  if (duplicate) { showToast('Ese nombre de usuario ya existe'); return; }

  const residentId = role === 'family' ? parseInt(document.getElementById('u-resident').value) : undefined;

  if (originalUsername) {
    // Editar existente
    const idx = USERS.findIndex(u => u.user === originalUsername);
    if (idx !== -1) {
      USERS[idx] = {
        ...USERS[idx],
        name,
        role,
        user: username,
        pass: pass || USERS[idx].pass,
        ...(role === 'family' ? { residentId } : { residentId: undefined })
      };
      // Si editó su propia cuenta, actualizar display
      if (originalUsername === currentUser.user) {
        currentUser = USERS[idx];
        window.currentUser = USERS[idx];
        document.getElementById('user-display').textContent = currentUser.name + ' · ' + ROLE_LABELS[currentUser.role];
      }
    }
    showToast('Usuario actualizado ✅');
  } else {
    // Nuevo usuario
    const newUser = { user: username, pass, name, role };
    if (role === 'family') newUser.residentId = residentId;
    USERS.push(newUser);
    showToast('Usuario creado ✅');
  }

  saveUsers();
  closeModal();
  renderTab('users');
}

function deleteUser(username) {
  if (username === currentUser.user) { showToast('No podés eliminar tu propia cuenta'); return; }
  if (!confirm('¿Eliminar el usuario ' + username + '?')) return;
  const idx = USERS.findIndex(u => u.user === username);
  if (idx !== -1) {
    const uname = USERS[idx].user;
    USERS.splice(idx, 1);
    // Borrar de Firestore también
    if (window._deleteUser) window._deleteUser(uname);
  }
  showToast('Usuario eliminado');
  renderTab('users');
}

function saveRopaItem(itemId = null) {
  const nombre = document.getElementById('ropa-nombre').value.trim();
  if (!nombre) { showToast('Escribí el nombre de la prenda'); return; }

  const foto = previewImg ? previewImg.src : (window._ropaFotoActual || null);

  const newItem = {
    id: itemId || Date.now(),
    residentId, nombre, talle, cantidad, obs, foto,
    fechaCarga: itemId ? (ropaItems.find(r=>r.id===itemId)?.fechaCarga || new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10),

  };

  if (itemId) {

  window._saveRopa(newItem.id);
  showToast('Prenda guardada');
  closeModal();
  renderTab('ropa');

function deleteRopa(id) {
  if (!confirm('¿Eliminar esta prenda?')) return;
  ropaItems = ropaItems.filter(r => r.id !== id);
  window._deleteRopa(id);
  showToast('Prenda eliminada');
  renderTab('ropa');
}

// FIX 2: saveMed llama a showResident (no renderResidentDetail que no existía)
function saveMed(residentId, medId = null) {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('Ingresá el nombre del medicamento'); return; }

  const newMed = {
    id: medId || Date.now(),
    residentId: parseInt(residentId),
    name: name,
    drug: document.getElementById('m-drug').value,
    conc: document.getElementById('m-conc').value,
    unit: document.getElementById('m-unit').value,
    treatment: document.getElementById('m-treatment').value,
    dailyDose: parseFloat(document.getElementById('m-daily').value.replace(',', '.')) || 0,
    qty: parseFloat(document.getElementById('m-qty').value) || 0,
    minDays: parseInt(document.getElementById('m-min-days').value) || 7,
    sos: document.getElementById('m-sos').checked,
    obs: document.getElementById('m-obs').value,
    horarios: Array.from(document.querySelectorAll('#horarios-container .horario-row')).map(row => ({
      hora: row.querySelector('input[type=time]')?.value || '',
      dosis: parseFloat(row.querySelector('.dosis-valor')?.value) || 1
    })).filter(h => h.hora),
    frecuencia: document.getElementById('m-frecuencia')?.value || 'diario',
    diasSemana: Array.from(document.querySelectorAll('input[name=dia-semana]:checked')).map(i => i.value),
    cadaXDias: parseInt(document.getElementById('m-cada-x')?.value) || 2,
    fechaInicio: (medId ? (medications.find(m => m.id === medId)?.fechaInicio) : null) || new Date().toISOString().slice(0,10),
    fechaFin: document.getElementById('m-fecha-fin')?.value || ''
  };

  if (medId) {
    medications = medications.map(m => m.id === medId ? newMed : m);
    showToast('Medicamento actualizado ✅');
  } else {
    medications.push(newMed);
    showToast('Medicamento agregado ✅');
  }

  // Guardar solo este medicamento específico en Firestore
  saveMeds(newMed.id);
  saveMovs();
  closeModal();
  showToast(medId ? 'Medicamento actualizado ✅' : 'Medicamento guardado ✅');
  showResident(parseInt(residentId));
}

function saveMedGeneral() {
  const residentId = parseInt(document.getElementById('m-res').value);
  saveMed(residentId, null);
}

function openMovement(medId, type) {
  const med = medications.find(m => m.id === medId);
  if (!med) return;
  showModal(`
    <div class="modal-title">${type === 'in' ? '⬆️ Entrada de stock' : '⬇️ Salida de stock'}</div>
    <p style="color:var(--text-muted);margin-bottom:20px;font-size:14px"><strong>${med.name}</strong> — Stock actual: ${med.qty} ${med.unit}</p>
    <div class="form-group"><label>Cantidad</label><input id="mov-qty" type="number" min="1" value="1"></div>
    <div class="form-group"><label>Observación (opcional)</label><input id="mov-note" type="text" placeholder="${type === 'in' ? 'Ej: Compra farmacia' : 'Ej: Administrado'}"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn ${type === 'in' ? 'btn-green' : 'btn-red'}" onclick="saveMovement(${medId}, '${type}')">Confirmar</button>
    </div>
  `);
}

function saveMovement(medId, type) {
  const qty = parseFloat(document.getElementById('mov-qty').value) || 0;
  if (qty <= 0) { showToast('Ingresá una cantidad válida'); return; }
  const note = document.getElementById('mov-note').value.trim();
  const med = medications.find(m => m.id === medId);
  if (!med) return;
  if (type === 'out' && med.qty < qty) { showToast('No hay suficiente stock'); return; }
  med.qty = type === 'in' ? med.qty + qty : med.qty - qty;
  saveMeds(medId);
  movements.push({ id: Date.now(), medId, medName: med.name, residentId: med.residentId, type, qty, unit: med.unit, by: currentUser.name, date: today(), note });
  saveMovs();
  closeModal();
  showToast(type === 'in' ? `+${qty} ${med.unit} agregados ✅` : `-${qty} ${med.unit} registrados ✅`);
  showResident(med.residentId);
}

function toggleHigieneFields() {
  const sel = document.getElementById('h-nombre');
  const opt = sel?.options[sel.selectedIndex];
  const isCustom = sel?.value === '__custom__';
  const tipo = isCustom
    ? document.getElementById('h-tipo-custom')?.value
    : opt?.getAttribute('data-tipo') || '';

  document.getElementById('h-tipo').value = tipo;
  document.getElementById('h-custom-field').style.display = isCustom ? 'block' : 'none';
  document.getElementById('h-mensual-fields').style.display = tipo === 'mensual' ? 'block' : 'none';
  document.getElementById('h-necesidad-fields').style.display = tipo === 'necesidad' ? 'block' : 'none';
}

function saveHygieneItem(residentId, itemId = null) {
  const sel = document.getElementById('h-nombre');
  const isCustom = sel?.value === '__custom__';
  const nombre = isCustom
    ? document.getElementById('h-nombre-custom')?.value.trim()
    : sel?.value;
  const tipo = isCustom
    ? document.getElementById('h-tipo-custom')?.value
    : document.getElementById('h-tipo')?.value;

  if (!nombre || nombre === '— Seleccionar —') { showToast('Seleccioná un artículo'); return; }

  const newItem = {
    id: itemId || Date.now(),
    residentId: parseInt(residentId),
    nombre,
    tipo,
    esPersonalizado: isCustom,
    fechaEntrega: tipo === 'mensual' ? (document.getElementById('h-fecha')?.value || '') : '',
    qty: tipo === 'necesidad' ? (parseFloat(document.getElementById('h-qty')?.value) || 0) : 0,
    unidad: tipo === 'necesidad' ? (document.getElementById('h-unidad')?.value || 'unidades') : '',
    dailyUse: tipo === 'necesidad' ? (parseFloat(document.getElementById('h-daily')?.value) || 0) : 0,
    minQty: tipo === 'necesidad' ? (parseInt(document.getElementById('h-min')?.value) || 5) : 0,
    obs: document.getElementById('h-obs')?.value || ''

  if (itemId) {
    hygieneItems = hygieneItems.map(h => h.id === itemId ? newItem : h);
    showToast('Artículo actualizado ✅');
  } else {
    hygieneItems.push(newItem);
    showToast('Artículo agregado ✅');
  }

  saveHygiene(newItem.id);
  closeModal();
  showResident(parseInt(residentId));
}

// Convierte dosis numérica a fracción legible
function formatDosisLabel(n) {
  if (n === 0.25) return '¼';
  if (n === 0.5)  return '½';
  if (n === 1.5)  return '1½';
  if (n === 2.5)  return '2½';
  if (Number.isInteger(n)) return String(n);
  return String(n).replace('.', ',');
}

// Singular/plural según cantidad y unidad
function formatUnidad(cantidad, unidad) {
  if (!unidad) return '';
  // Para gotas y unidades que no tienen plural diferente
  const invariables = ['gotas', '%', 'ml', 'aplicaciones'];
  if (invariables.includes(unidad)) return unidad;
  // Si la cantidad es exactamente 1 o fracción menor a 1 → singular
  const singular = cantidad <= 1;
  const plurales = {
    'comprimidos': 'comprimido',
    'cápsulas': 'cápsula',
    'sobres': 'sobre',
    'parches': 'parche',
    'unidades': 'unidad',
  };
  if (singular && plurales[unidad]) return plurales[unidad];
  return unidad;
}

function printResident(id) {
  const res  = RESIDENTS.find(r => r.id === id);
  const meds = medications.filter(m => m.residentId === id);
  const now  = new Date();
  const fechaHoy   = now.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const fechaCorta = now.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });

  const filas = meds.map(m => {
    const treatLabel = m.treatment === 'unica' ? 'Única toma'
      : m.treatment === 'evolucion' ? 'A evaluar'
      : 'Prolongado';

    // Horarios con dosis en fracción, o SOS
    let horariosHtml;
    if (m.sos) {
      horariosHtml = '<span class="sos-tag">SOS</span>';
    } else {
      const hs = normalizarHorarios(m);
      horariosHtml = hs.length > 0
        ? hs.map(h => `<span class="horario-pill">${h.hora} · ${formatDosisLabel(h.dosis)} ${formatUnidad(h.dosis, m.unit)}</span>`).join(' ')
        : '—';
    }

    // Dosis total diaria en fracción
    const dosisTotal = getDosisdiaria(m);
    const dosisTotalLabel = dosisTotal > 0 ? `${formatDosisLabel(dosisTotal)} ${formatUnidad(dosisTotal, m.unit)}/día` : '—';

    return `<tr>
      <td>
        <span class="med-name">${m.name}</span>
        ${(m.drug || m.conc) ? `<span class="med-sub">${[m.drug, m.conc].filter(Boolean).join(' · ')}</span>` : ''}
        ${m.obs ? `<span class="med-sub" style="font-style:italic">${m.obs}</span>` : ''}
      </td>
      <td>${horariosHtml}</td>
      <td style="text-align:center;font-weight:700">${dosisTotalLabel}</td>
      <td>${treatLabel}</td>
    </tr>`;
  }).join('');

  const html = `
    <div class="print-topband">
      <div>
        <div class="print-institution">Residencia Sol de Otoño y El Chalet</div>
        <div class="print-subtitle">Planilla de medicamentos activos</div>
      </div>
      <div class="print-fecha">Generado el<strong>${fechaHoy}</strong></div>
    </div>
    <div class="print-resident-block">
      <div class="print-resident-avatar">👤</div>
      <div>
        <div class="print-label">Residente</div>
        <div class="print-name">${res.name}</div>
      </div>
    </div>
    ${meds.length === 0
      ? '<p style="color:#7a5c40;font-size:13px;padding:16px 0">Sin medicamentos cargados.</p>'
      : `<table class="print-table">
          <thead><tr>
            <th style="width:32%">Medicamento</th>
            <th style="width:38%">Horarios / SOS</th>
            <th style="width:16%;text-align:center">Dosis diaria</th>
            <th style="width:14%">Tratamiento</th>
          </tr></thead>
          <tbody>${filas}</tbody>
        </table>`
    }
    <div class="print-firma">
      <div class="print-firma-box">Firma médico / profesional</div>
      <div class="print-firma-box">Matrícula / Sello</div>
      <div class="print-firma-box">Fecha</div>
    </div>
    <div class="print-footer">
      <span class="footer-logo">🍂 MedStock</span>
      <span>Residencia Sol de Otoño y El Chalet</span>
      <span>${fechaCorta}</span>
    </div>
  `;

  const area = document.getElementById('print-area');
  area.innerHTML = html;
  window.print();
}

<script>

  e.preventDefault();

    document.getElementById('install-bar-app').style.display = 'flex';
  }
});

  handleInstall();

async function handleInstall() {
  if (deferredPrompt) {
    // Android/Chrome — instala directo
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if (outcome === 'accepted') {
      localStorage.setItem('medstock_install_dismissed', '1');
      const card = document.getElementById('install-card');

              <span>Deslizá hacia abajo y tocá <strong>"Agregar a pantalla de inicio"</strong></span>
            </div>
            <div style="display:flex;gap:12px;align-items:flex-start">
              <span style="background:var(--amber);color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">3</span>
              <span>Tocá <strong>Agregar</strong> arriba a la derecha</span>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="closeModal()">Entendido</button>
        </div>
      `);
    } else {
      showToast('Abrí esta página en Chrome para instalar la app 📲');
    }
  }
}

function dismissInstall() {
  document.getElementById('install-bar-app').style.display = 'none';
  localStorage.setItem('medstock_install_dismissed', '1');
}

// Si ya está instalada como PWA, ocultar el banner
if (window.matchMedia('(display-mode: standalone)').matches) {
  document.getElementById('install-bar-app').style.display = 'none';
}
</script>
