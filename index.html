<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedStock – Residencia Sol de Otoño y El Chalet</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2; --warm-white: #fff9f2; --amber: #d4883a; --amber-light: #f0b060;
    --amber-dark: #a05e20; --brown: #5c3d1e; --brown-light: #8a6040; --green: #4a7c59;
    --green-light: #e8f4ec; --red: #c0392b; --red-light: #fdecea; --yellow: #e6a817;
    --yellow-light: #fef9e7; --blue: #2c6fad; --blue-light: #e8f0fb; --text: #2d1f0e;
    --text-muted: #7a5c40; --border: #e8d8c4; --shadow: 0 2px 16px rgba(92,61,30,0.10);
    --shadow-lg: 0 8px 40px rgba(92,61,30,0.16); --radius: 14px; --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fdf3e3 0%, #f5e6d0 50%, #eeddc0 100%); padding: 20px; }
  .login-card { background: white; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .icon { font-size: 52px; display: block; margin-bottom: 12px; }
  .login-logo h1 { font-family: 'Fraunces', serif; font-size: 26px; color: var(--brown); font-weight: 700; }
  
  /* FORMULARIOS */
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--brown); margin-bottom: 6px; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; outline: none; background: var(--warm-white); }
  
  /* BOTONES */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
  .btn-primary { background: var(--amber); color: white; }
  .btn-green { background: var(--green); color: white; }
  .btn-secondary { background: var(--border); color: var(--brown); }
  .btn-red { background: var(--red); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* APP */
  #app { display: none; }
  .topbar { background: var(--brown); color: white; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .nav-tabs { background: white; border-bottom: 2px solid var(--border); padding: 0 24px; display: flex; overflow-x: auto; }
  .nav-tab { padding: 16px 20px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  .nav-tab.active { color: var(--amber); border-bottom-color: var(--amber); }
  .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* TABLAS Y CARDS */
  .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: var(--cream); padding: 12px; text-align: left; color: var(--text-muted); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
  td { padding: 14px 12px; border-bottom: 1px solid var(--border); }
  
  /* BADGES */
  .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .badge-ok { background: var(--green-light); color: var(--green); }
  .badge-low { background: var(--yellow-light); color: var(--yellow); }
  .badge-out { background: var(--red-light); color: var(--red); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: white; border-radius: 20px; padding: 30px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--brown); color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 2000; box-shadow: var(--shadow-lg); }

  @media print { .topbar, .nav-tabs, .btn, .back-btn { display: none !important; } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🍂</span>
      <h1>MedStock</h1>
      <p>Gestión Sol de Otoño y El Chalet</p>
    </div>
    <div id="login-error" style="color:var(--red); font-size:13px; margin-bottom:15px; display:none; text-align:center;">Credenciales incorrectas</div>
    <div class="form-group"><label>Usuario</label><input type="text" id="login-user" placeholder="usuario"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-family:'Fraunces'; font-weight:700">🍂 MedStock</div>
    <div id="user-display" style="font-size:13px opacity:0.8"></div>
    <button class="btn btn-sm btn-secondary" onclick="doLogout()">Salir</button>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="main-content" id="main-content"></div>
</div>

<div id="toast"></div>

<script>
// CONFIGURACIÓN Y DATOS
const UNITS = ['comprimidos', 'sobres', 'porcentaje', 'capsulas', 'parches', 'unidades', 'ml'];
const TREATMENTS = [
  {id: 'prolongado', label: 'Tratamiento Prolongado'},
  {id: 'unica', label: 'Única toma'},
  {id: 'evolucion', label: 'Esperar evolución'}
];

// Usuarios de prueba (igual que en tu código original)
const USERS = [
  { user: 'camila.distefano', pass: '1234', name: 'Camila Distéfano', role: 'owner' },
  { user: 'josefina.varona', pass: '1234', name: 'Josefina Varona', role: 'nurse' },
  { user: 'amelia.apez', pass: '1234', name: 'Familiar – Amelia Ápez', role: 'family', residentId: 1 }
];

const RESIDENTS = [
  { id: 1, name: 'Amelia Ápez' },
  { id: 2, name: 'María Doralinda Moreno' },
  { id: 3, name: 'Lidia Esther Gómez' }
];

let currentUser = null;
let currentTab = 'home';
let medications = JSON.parse(localStorage.getItem('meds')) || [];
let movements = JSON.parse(localStorage.getItem('movs')) || [];

// PERSISTENCIA SIMPLE (Sustituir por Firestore luego)
function saveData() {
  localStorage.setItem('meds', JSON.stringify(medications));
  localStorage.setItem('movs', JSON.stringify(movements));
}

// LÓGICA DE NEGOCIO
function getStatus(m) {
  if (m.qty <= 0) return 'out';
  if (m.dailyDose > 0) {
    const daysLeft = m.qty / m.dailyDose;
    if (daysLeft <= (m.minDays || 7)) return 'low';
  }
  return 'ok';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// AUTENTICACIÓN
function doLogin() {
  const u = document.getElementById('login-user').value.toLowerCase();
  const p = document.getElementById('login-pass').value;
  const found = USERS.find(x => x.user === u && x.pass === p);
  if (!found) { document.getElementById('login-error').style.display = 'block'; return; }
  currentUser = found;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = found.name;
  renderTab(currentUser.role === 'family' ? 'my-resident' : 'home');
}

function doLogout() { location.reload(); }

// NAVEGACIÓN
function renderTab(tab) {
  currentTab = tab;
  const tabs = document.getElementById('nav-tabs');
  const c = document.getElementById('main-content');
  
  let menu = [
    {id: 'home', label: '🏠 Inicio', roles: ['owner', 'manager', 'nurse']},
    {id: 'residents', label: '👥 Residentes', roles: ['owner', 'manager', 'nurse']},
    {id: 'my-resident', label: '👤 Mi Familiar', roles: ['family']}
  ];

  tabs.innerHTML = menu.filter(m => m.roles.includes(currentUser.role)).map(m => 
    `<div class="nav-tab ${currentTab === m.id ? 'active' : ''}" onclick="renderTab('${m.id}')">${m.label}</div>`
  ).join('');

  if (tab === 'home') renderHome(c);
  if (tab === 'residents') renderResidents(c);
  if (tab === 'my-resident') renderResidentDetail(c, currentUser.residentId);
}

// VISTAS
function renderHome(c) {
  const low = medications.filter(m => getStatus(m) !== 'ok').length;
  c.innerHTML = `
    <h2 style="margin-bottom:20px; font-family:'Fraunces'">🍂 Resumen General</h2>
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card" style="padding:20px; text-align:center">
        <div style="font-size:32px">💊</div>
        <div style="font-size:24px; font-weight:700">${medications.length}</div>
        <div style="font-size:12px; color:var(--text-muted)">Medicamentos Totales</div>
      </div>
      <div class="card" style="padding:20px; text-align:center">
        <div style="font-size:32px">⚠️</div>
        <div style="font-size:24px; font-weight:700; color:var(--red)">${low}</div>
        <div style="font-size:12px; color:var(--text-muted)">Alertas de Stock</div>
      </div>
    </div>
  `;
}

function renderResidents(c) {
  c.innerHTML = `
    <h2 style="margin-bottom:20px; font-family:'Fraunces'">👥 Listado de Residentes</h2>
    <div class="grid-2">
      ${RESIDENTS.map(r => `
        <div class="card" style="padding:20px; cursor:pointer" onclick="renderResidentDetail(document.getElementById('main-content'), ${r.id})">
          <div style="font-weight:700; color:var(--brown)">${r.name}</div>
          <div style="font-size:13px; color:var(--text-muted)">Medicación activa: ${medications.filter(m => m.residentId === r.id).length}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderResidentDetail(c, rid) {
  const res = RESIDENTS.find(r => r.id === rid);
  const meds = medications.filter(m => m.residentId === rid);
  
  c.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
       <div>
         <div style="font-size:14px; color:var(--text-muted); cursor:pointer" onclick="renderTab('residents')">← Volver</div>
         <h2 style="font-family:'Fraunces'">${res.name}</h2>
       </div>
       <div style="display:flex; gap:10px">
         ${currentUser.role !== 'family' ? `<button class="btn btn-primary btn-sm" onclick="openMedModal(${rid})">+ Agregar Medicamento</button>` : ''}
         <button class="btn btn-secondary btn-sm" onclick="window.print()">📥 Exportar PDF</button>
       </div>
    </div>
    
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Medicamento</th>
              <th>Tratamiento</th>
              <th>Dosis Diaria</th>
              <th>Stock Actual</th>
              <th>Estado</th>
              ${currentUser.role !== 'family' ? '<th>Acciones</th>' : ''}
            </tr>
          </thead>
          <tbody>
            ${meds.map(m => {
              const st = getStatus(m);
              return `
              <tr>
                <td><strong>${m.name}</strong><br><small>${m.drug || ''}</small> ${m.sos ? '<span class="badge badge-low" style="padding:2px 5px">SOS</span>' : ''}</td>
                <td style="font-size:12px">${TREATMENTS.find(t => t.id === m.treatment)?.label || '—'}</td>
                <td>${m.dailyDose} ${m.unit}/día</td>
                <td>${m.qty} ${m.unit}</td>
                <td><span class="badge badge-${st}">${st === 'ok' ? 'En Stock' : st === 'low' ? 'Bajo' : 'Agotado'}</span></td>
                ${currentUser.role !== 'family' ? `
                  <td style="display:flex; gap:5px">
                    <button class="btn btn-green btn-sm" onclick="registerTake(${m.id})">Dar</button>
                    <button class="btn btn-secondary btn-sm" onclick="openMedModal(${rid}, ${m.id})">⚙️</button>
                    <button class="btn btn-red btn-sm" onclick="deleteMed(${m.id})">🗑</button>
                  </td>
                ` : ''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// MODAL Y ACCIONES
function openMedModal(residentId, medId = null) {
  const med = medId ? medications.find(m => m.id === medId) : null;
  const html = `
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h3 style="margin-bottom:20px; font-family:'Fraunces'">${med ? 'Editar' : 'Nuevo'} Medicamento</h3>
        <div class="form-group"><label>Nombre</label><input type="text" id="m-name" value="${med?.name || ''}"></div>
        <div class="form-group"><label>Droga/Presentación</label><input type="text" id="m-drug" value="${med?.drug || ''}"></div>
        
        <div class="grid-2">
          <div class="form-group">
            <label>Unidad</label>
            <select id="m-unit">
              ${UNITS.map(u => `<option value="${u}" ${med?.unit === u ? 'selected' : ''}>${u}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Dosis diaria</label><input type="number" id="m-daily" value="${med?.dailyDose || 1}"></div>
        </div>

        <div class="form-group">
          <label>Tipo de Tratamiento</label>
          <select id="m-treatment">
            ${TREATMENTS.map(t => `<option value="${t.id}" ${med?.treatment === t.id ? 'selected' : ''}>${t.label}</option>`).join('')}
          </select>
        </div>

        <div class="grid-2">
          <div class="form-group"><label>Stock Inicial</label><input type="number" id="m-qty" value="${med?.qty || 0}"></div>
          <div class="form-group"><label>Avisar cuando falten (días)</label><input type="number" id="m-min" value="${med?.minDays || 7}"></div>
        </div>

        <div class="form-group" style="display:flex; gap:10px; align-items:center">
          <input type="checkbox" id="m-sos" ${med?.sos ? 'checked' : ''}> <label style="margin:0">Es SOS (Suministrar solo si es necesario)</label>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px">
          <button class="btn btn-secondary" onclick="document.getElementById('modal').remove()">Cerrar</button>
          <button class="btn btn-primary" onclick="saveMedData(${residentId}, ${medId})">Guardar</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

function saveMedData(rid, mid) {
  const data = {
    id: mid || Date.now(),
    residentId: rid,
    name: document.getElementById('m-name').value,
    drug: document.getElementById('m-drug').value,
    unit: document.getElementById('m-unit').value,
    dailyDose: parseFloat(document.getElementById('m-daily').value),
    treatment: document.getElementById('m-treatment').value,
    qty: parseFloat(document.getElementById('m-qty').value),
    minDays: parseInt(document.getElementById('m-min').value),
    sos: document.getElementById('m-sos').checked
  };

  if (mid) {
    const idx = medications.findIndex(m => m.id === mid);
    medications[idx] = data;
  } else {
    medications.push(data);
  }

  saveData();
  document.getElementById('modal').remove();
  renderResidentDetail(document.getElementById('main-content'), rid);
  showToast("Guardado correctamente");
}

function registerTake(mid) {
  const med = medications.find(m => m.id === mid);
  if (med.qty < med.dailyDose) return showToast("⚠️ Stock insuficiente");
  
  med.qty -= med.dailyDose;
  movements.push({ date: new Date().toLocaleString(), medId: mid, qty: med.dailyDose, type: 'take' });
  
  saveData();
  renderResidentDetail(document.getElementById('main-content'), med.residentId);
  showToast("Toma registrada");
}

function deleteMed(mid) {
  if (!confirm("¿Eliminar este medicamento?")) return;
  const rid = medications.find(m => m.id === mid).residentId;
  medications = medications.filter(m => m.id !== mid);
  saveData();
  renderResidentDetail(document.getElementById('main-content'), rid);
}

</script>
</body>
</html>
