<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedStock - Residencia Sol de Otoño y El Chalet</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf7f2; --warm-white: #fff9f2; --amber: #d4883a; --amber-light: #f0b060;
            --amber-dark: #a05e20; --brown: #5c3d1e; --brown-light: #8a6040; --green: #4a7c59;
            --green-light: #e8f4ec; --red: #c0392b; --red-light: #fdecea; --yellow: #e6a817;
            --yellow-light: #fef9e7; --blue: #2c6fad; --blue-light: #e8f0fb; --text: #2d1f0e;
            --text-muted: #7a5c40; --border: #e8d8c4; --shadow: 0 2px 16px rgba(92,61,30,0.10);
            --shadow-lg: 0 8px 40px rgba(92,61,30,0.16); --radius: 14px; --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--cream); color: var(--text); line-height: 1.5; overflow-x: hidden; }
        
        /* Layout */
        .topbar { background: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Fraunces', serif; font-size: 20px; color: var(--brown); display: flex; align-items: center; gap: 8px; font-weight: 700; }
        nav { background: white; padding: 0 24px; border-bottom: 1px solid var(--border); display: flex; gap: 20px; overflow-x: auto; }
        .nav-item { padding: 14px 4px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
        .nav-item.active { color: var(--amber); border-bottom-color: var(--amber); }
        .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 120px); }

        /* UI Elements */
        .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 24px; overflow: hidden; }
        .card-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--warm-white); }
        .card-title { font-family: 'Fraunces', serif; font-size: 18px; color: var(--brown); font-weight: 700; }
        .btn { padding: 10px 18px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--amber); color: white; }
        .btn-secondary { background: var(--blue-light); color: var(--blue); }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red-light); color: var(--red); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        /* Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 14px 20px; font-size: 12px; text-transform: uppercase; color: var(--text-muted); background: var(--warm-white); border-bottom: 1px solid var(--border); }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 600; color: var(--text-muted); }
        input, select { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-family: inherit; font-size: 14px; }
        
        /* Resident Cards */
        .resident-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .resident-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
        .resident-card:hover { border-color: var(--amber); transform: translateY(-2px); }
        
        /* Alerts & Badges */
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-ok { background: var(--green-light); color: var(--green); }
        .badge-low { background: var(--red-light); color: var(--red); }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; width: 60px; overflow: hidden; }
        .progress-fill { height: 100%; }
        .fill-ok { background: var(--green); }
        .fill-low { background: var(--red); }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--cream); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; text-align: center; }

        @media print {
            nav, .topbar, .back-btn, .btn, .no-print, .search-bar, .modal-overlay { display: none !important; }
            body { background: white !important; }
            .main-content { padding: 0 !important; }
            .card { border: 1px solid #eee !important; box-shadow: none !important; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1 style="font-family:'Fraunces'; margin-bottom:10px;">Sol de Otoño</h1>
        <p style="color:var(--text-muted); margin-bottom:20px;">Gestión de Medicamentos</p>
        <div class="form-group"><input type="text" id="login-user" placeholder="Usuario"></div>
        <div class="form-group"><input type="password" id="login-pass" placeholder="Contraseña"></div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="doLogin()">Ingresar</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="topbar">
        <div class="logo">🍂 Sol de Otoño</div>
        <div id="user-info" style="font-size:13px; font-weight:600;"></div>
        <button class="btn btn-red btn-sm" onclick="logout()">Salir</button>
    </div>
    <nav>
        <div class="nav-item active" onclick="renderTab('residents')">👥 Residentes</div>
        <div class="nav-item" onclick="renderTab('stock')">📦 Stock Global</div>
    </nav>
    <div id="main-content" class="main-content"></div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div id="modal-content" class="modal"></div>
</div>

<script>
    // --- DATOS ---
    const RESIDENTS = [
        { id: 1, name: "Maria Garcia" }, { id: 2, name: "Juan Perez" },
        { id: 3, name: "Ana Lopez" }, { id: 4, name: "Pedro Gomez" },
        { id: 5, name: "Luisa Rodriguez" }, { id: 6, name: "Carlos Sanchez" }
    ];

    let medications = JSON.parse(localStorage.getItem('meds_v2')) || [];
    let currentUser = null;

    // --- AUTENTICACIÓN ---
    function doLogin() {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if ((u === 'admin' && p === '1234') || (u === 'enfermeria' && p === '1234')) {
            currentUser = { name: u, role: u === 'admin' ? 'admin' : 'staff' };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('user-info').innerText = "Hola, " + u;
            renderTab('residents');
        } else {
            alert("Credenciales incorrectas");
        }
    }

    function logout() { location.reload(); }

    function canEdit() { return currentUser && currentUser.role === 'admin'; }

    // --- NAVEGACIÓN ---
    function renderTab(tab) {
        const c = document.getElementById('main-content');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (tab === 'residents') {
            document.querySelectorAll('.nav-item')[0].classList.add('active');
            renderResidents(c);
        } else {
            document.querySelectorAll('.nav-item')[1].classList.add('active');
            c.innerHTML = '<h2>Próximamente: Stock Global</h2>';
        }
    }

    // --- VISTA RESIDENTES (CON BÚSQUEDA FLUIDA) ---
    function renderResidents(c) {
        if (!window._resSearch) window._resSearch = '';
        const list = RESIDENTS.filter(r => r.name.toLowerCase().includes(window._resSearch.toLowerCase()));

        c.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 class="card-title">Listado de Residentes</h2>
                <input type="text" id="res-search" placeholder="Buscar..." value="${window._resSearch}" style="width:200px;">
            </div>
            <div class="resident-grid">
                ${list.map(r => `
                    <div class="resident-card" onclick="showResident(${r.id})">
                        <div style="font-weight:700;">👤 ${r.name}</div>
                        <div style="font-size:12px; color:var(--text-muted); margin-top:8px;">
                            ${medications.filter(m => m.residentId === r.id).length} Medicamentos
                        </div>
                    </div>
                `).join('')}
            </div>
        `;

        const input = document.getElementById('res-search');
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
        input.oninput = (e) => {
            window._resSearch = e.target.value;
            renderResidents(c);
        };
    }

    // --- DETALLE RESIDENTE ---
    function showResident(id) {
        const res = RESIDENTS.find(r => r.id === id);
        const meds = medications.filter(m => m.residentId === id);
        const c = document.getElementById('main-content');

        c.innerHTML = `
            <div style="margin-bottom:20px; cursor:pointer; color:var(--amber);" onclick="renderTab('residents')">← Volver</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 class="card-title">Planilla de ${res.name}</h2>
                <button class="btn btn-secondary btn-sm" onclick="window.print()">📥 PDF</button>
            </div>
            
            <button class="btn btn-primary btn-sm" style="margin-bottom:15px;" onclick="openAddMed(${id})">+ Agregar Medicamento</button>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Medicamento</th>
                            <th>Dosis/Día</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th class="no-print">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${meds.map(m => {
                            const st = getStatus(m);
                            return `
                            <tr>
                                <td><strong>${m.name}</strong><br><small>${m.drug || ''}</small></td>
                                <td>${m.dailyDose} ${m.unit}</td>
                                <td>${m.qty} ${m.unit}</td>
                                <td><span class="badge badge-${st}">${st === 'ok' ? 'OK' : 'BAJO'}</span></td>
                                <td class="no-print">
                                    <button class="btn btn-green btn-sm" onclick="registerTake(${m.id})">Dar</button>
                                    <button class="btn btn-secondary btn-sm" onclick="openAddMed(${id}, ${m.id})">⚙️</button>
                                    <button class="btn btn-red btn-sm" onclick="deleteMed(${m.id})">🗑</button>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // --- GESTIÓN DE MEDICAMENTOS ---
    function openAddMed(resId, medId = null) {
        const med = medId ? medications.find(m => m.id === medId) : null;
        showModal(`
            <h3 style="margin-bottom:20px;">${med ? 'Editar' : 'Agregar'} Medicamento</h3>
            <div class="form-group"><label>Nombre</label><input id="m-name" value="${med?.name || ''}"></div>
            <div class="form-group"><label>Droga</label><input id="m-drug" value="${med?.drug || ''}"></div>
            <div class="form-group"><label>Dosis diaria</label><input id="m-daily" type="number" value="${med?.dailyDose || 1}"></div>
            <div class="form-group"><label>Stock Inicial</label><input id="m-qty" type="number" value="${med?.qty || 0}"></div>
            <div class="form-group">
                <label>Unidad</label>
                <select id="m-unit">
                    <option ${med?.unit === 'comprimidos' ? 'selected' : ''}>comprimidos</option>
                    <option ${med?.unit === 'gotas' ? 'selected' : ''}>gotas</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" onclick="saveMed(${resId}, ${medId})">Guardar</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        `);
    }

    function saveMed(resId, medId) {
        const newMed = {
            id: medId || Date.now(),
            residentId: resId,
            name: document.getElementById('m-name').value,
            drug: document.getElementById('m-drug').value,
            dailyDose: parseFloat(document.getElementById('m-daily').value) || 0,
            qty: parseFloat(document.getElementById('m-qty').value) || 0,
            unit: document.getElementById('m-unit').value
        };

        if (medId) medications = medications.map(m => m.id === medId ? newMed : m);
        else medications.push(newMed);

        localStorage.setItem('meds_v2', JSON.stringify(medications));
        closeModal();
        showResident(resId);
    }

    function registerTake(mid) {
        const m = medications.find(x => x.id === mid);
        if (m.qty >= m.dailyDose) {
            m.qty -= m.dailyDose;
            localStorage.setItem('meds_v2', JSON.stringify(medications));
            showResident(m.residentId);
        } else {
            alert("¡Sin stock!");
        }
    }

    function deleteMed(id) {
        if (confirm("¿Borrar?")) {
            const rid = medications.find(m => m.id === id).residentId;
            medications = medications.filter(m => m.id !== id);
            localStorage.setItem('meds_v2', JSON.stringify(medications));
            showResident(rid);
        }
    }

    function getStatus(m) {
        return m.qty < (m.dailyDose * 7) ? 'low' : 'ok';
    }

    // --- MODAL UTILS ---
    function showModal(html) {
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>

</body>
</html>
