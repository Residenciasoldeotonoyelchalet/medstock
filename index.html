<html lang="es">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedStock – Residencia Sol de Otoño</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f2;
    --amber: #d4883a;
    --amber-light: #f0b060;
    --amber-dark: #a05e20;
    --brown: #5c3d1e;
    --brown-light: #8a6040;
    --green: #4a7c59;
    --green-light: #e8f4ec;
    --red: #c0392b;
    --red-light: #fdecea;
    --yellow: #e6a817;
    --yellow-light: #fef9e7;
    --blue: #2c6fad;
    --blue-light: #e8f0fb;
    --text: #2d1f0e;
    --text-muted: #7a5c40;
    --border: #e8d8c4;
    --shadow: 0 2px 16px rgba(92,61,30,0.10);
    --shadow-lg: 0 8px 40px rgba(92,61,30,0.16);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ====== LOGIN ====== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fdf3e3 0%, #f5e6d0 50%, #eeddc0 100%);
    padding: 20px;
  }

  .login-card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo .icon {
    font-size: 52px;
    display: block;
    margin-bottom: 12px;
  }

  .login-logo h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    color: var(--brown);
    font-weight: 700;
    line-height: 1.2;
  }

  .login-logo p {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--brown);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--warm-white);
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--amber);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--amber);
    color: white;
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
  }

  .btn-primary:hover { background: var(--amber-dark); }

  .btn-secondary {
    background: var(--border);
    color: var(--brown);
  }

  .btn-secondary:hover { background: #d8c4a8; }

  .btn-green {
    background: var(--green);
    color: white;
  }

  .btn-green:hover { background: #3a6347; }

  .btn-red {
    background: var(--red);
    color: white;
  }

  .btn-red:hover { background: #a93226; }

  .btn-sm {
    padding: 7px 14px;
    font-size: 13px;
  }

  .login-error {
    background: var(--red-light);
    color: var(--red);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }

  /* ====== APP SHELL ====== */
  #app { display: none; min-height: 100vh; background: var(--cream); }

  .topbar {
    background: var(--brown);
    color: white;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
  }

  .topbar-brand span { font-size: 22px; }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }

  .user-badge {
    background: rgba(255,255,255,0.15);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
  }

  .btn-logout {
    background: rgba(255,255,255,0.15);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }

  .btn-logout:hover { background: rgba(255,255,255,0.25); }

  .nav-tabs {
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
  }

  .nav-tab {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-tab:hover { color: var(--amber); }
  .nav-tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  .main-content { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }

  /* ====== CARDS ====== */
  .card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--brown);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body { padding: 20px 22px; }

  /* ====== STATS ====== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--brown); font-family: 'Fraunces', serif; }
  .stat-card .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* ====== TABLE ====== */
  .table-wrapper { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }

  th {
    background: var(--cream);
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--warm-white); }

  /* ====== BADGES ====== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-ok { background: var(--green-light); color: var(--green); }
  .badge-low { background: var(--yellow-light); color: var(--yellow); }
  .badge-out { background: var(--red-light); color: var(--red); }
  .badge-role { background: var(--blue-light); color: var(--blue); }

  /* ====== PROGRESS BAR ====== */
  .progress-bar {
    background: var(--border);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
    min-width: 80px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s;
  }

  .fill-ok { background: var(--green); }
  .fill-low { background: var(--yellow); }
  .fill-out { background: var(--red); }

  /* ====== MODAL ====== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }

  .modal {
    background: white;
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--brown);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  /* ====== ALERTS ====== */
  .alert-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    font-size: 14px;
  }

  .alert-low { background: var(--yellow-light); border-left: 4px solid var(--yellow); }
  .alert-out { background: var(--red-light); border-left: 4px solid var(--red); }

  /* ====== SEARCH ====== */
  .search-bar {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--warm-white);
    outline: none;
  }

  .search-bar input:focus { border-color: var(--amber); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
  }

  /* ====== RESIDENT LIST ====== */
  .resident-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .resident-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .resident-card:hover {
    border-color: var(--amber);
    box-shadow: 0 4px 20px rgba(212,136,58,0.15);
    transform: translateY(-2px);
  }

  .resident-name {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--brown);
    margin-bottom: 8px;
  }

  .resident-meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* ====== MOVEMENTS ====== */
  .movement-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    align-items: flex-start;
  }

  .movement-item:last-child { border-bottom: none; }

  .movement-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .mov-in { background: var(--green-light); }
  .mov-out { background: var(--red-light); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--brown);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag {
    display: inline-block;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--brown);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    display: none;
    z-index: 9999;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 16px;
    padding: 4px 0;
  }

  .back-btn:hover { color: var(--amber); }

  @media (max-width: 768px) {
    .main-content { padding: 16px; }
    .login-card { padding: 32px 24px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .modal { padding: 24px 20px; }
  }
</style>

function loadInitialMeds() {
  if (localStorage.getItem('medstock_initialized')) return;
  const ts = Date.now();
  const meds = INITIAL_MEDICATIONS.map((m, i) => ({
    id: ts + i,
    residentId: m.residentId,
    name: m.name,
    drug: m.drug,
    concentration: m.concentration,
    unit: m.unit,
    qty: m.qty,
    minQty: m.minQty,
    horario: m.horario || '',
    sos: m.sos || false,
    expiry: '',
    obs: '',
    addedBy: 'Sistema',
    addedDate: '11/04/2026'
  }));
  localStorage.setItem('medstock_meds', JSON.stringify(meds));
  localStorage.setItem('medstock_initialized', '1');
}

let movements = JSON.parse(localStorage.getItem('medstock_movs') || '[]');

function saveMovs() { localStorage.setItem('medstock_movs', JSON.stringify(movements)); }

// =====================================================
// AUTH
// =====================================================

function doLogin() {
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  const found = USERS.find(x => x.user === u && x.pass === p);
  if (!found) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  currentUser = found;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = found.name + ' · ' + ROLE_LABELS[found.role];
  buildNav();
  renderTab('home');
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function canEdit() { return ['owner','manager','nurse'].includes(currentUser.role); }
function isAdmin() { return ['owner','manager'].includes(currentUser.role); }

// =====================================================
// NAV
// =====================================================

function buildNav() {
  const tabs = document.getElementById('nav-tabs');
  let items = [];
  if (currentUser.role === 'family') {
    items = [
      { id: 'home', label: '🏠 Inicio' },
      { id: 'my-resident', label: '👤 Mi familiar' },
    ];
  } else {
    items = [
      { id: 'home', label: '🏠 Inicio' },
      { id: 'residents', label: '👥 Residentes' },
      { id: 'medications', label: '💊 Medicamentos' },
      { id: 'movements', label: '📋 Movimientos' },
    ];
    if (isAdmin()) items.push({ id: 'users', label: '⚙️ Usuarios' });
  }
  tabs.innerHTML = items.map(t =>
    `<div class="nav-tab ${t.id === currentTab ? 'active' : ''}" onclick="renderTab('${t.id}')">${t.label}</div>`
  ).join('');
}

function renderTab(tab) {
  currentTab = tab;
  buildNav();
  const c = document.getElementById('main-content');
  if (tab === 'home') renderHome(c);
  else if (tab === 'residents') renderResidents(c);
  else if (tab === 'my-resident') renderMyResident(c);
  else if (tab === 'medications') renderMedications(c);
  else if (tab === 'movements') renderMovements(c);
  else if (tab === 'users') renderUsers(c);
}

        </div>

  }

  c.innerHTML = `
    <h2 class="section-title">🍂 Panel general</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${RESIDENTS.length}</div>
        <div class="stat-label">Residentes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💊</div>
        <div class="stat-value">${totalMeds}</div>
        <div class="stat-label">Medicamentos cargados</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚠️</div>
        <div class="stat-value" style="color:var(--yellow)">${lowCount}</div>
        <div class="stat-label">Stock bajo</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚨</div>
        <div class="stat-value" style="color:var(--red)">${outCount}</div>
        <div class="stat-label">Sin stock</div>
      </div>
    </div>
    ${renderAlertsSection(medications)}
    <div class="card" style="margin-top:20px">
      <div class="card-header">
        <div class="card-title">📋 Últimos movimientos</div>
      </div>
      <div class="card-body">
        ${movements.length === 0 ? '<div class="empty-state"><div class="empty-icon">📭</div><p>Sin movimientos registrados</p></div>' :
          movements.slice(-8).reverse().map(mov => {
            const res = RESIDENTS.find(r => r.id === mov.residentId);
            return `<div class="movement-item">
              <div class="movement-icon ${mov.type === 'in' ? 'mov-in' : 'mov-out'}">${mov.type === 'in' ? '⬆️' : '⬇️'}</div>
              <div>
                <strong>${mov.medName}</strong> — ${res ? res.name : ''}<br>
                <span style="color:var(--text-muted);font-size:13px">${mov.type === 'in' ? '+' : '-'}${mov.qty} ${mov.unit} · ${mov.by} · ${mov.date}</span>
              </div>
            </div>`;
          }).join('')
        }
      </div>
    </div>
  `;
}

function renderAlertsSection(meds) {
  const alerts = meds.filter(m => getStatus(m) !== 'ok');
  if (alerts.length === 0) return `<div class="card"><div class="card-body" style="text-align:center;padding:24px;color:var(--green)">✅ Todo el stock en buen estado</div></div>`;
  return `<div class="card">
    <div class="card-header"><div class="card-title">🔔 Alertas de stock</div></div>
    <div class="card-body">
      ${alerts.map(m => {
        const res = RESIDENTS.find(r => r.id === m.residentId);
        const st = getStatus(m);
        return `<div class="alert-item ${st === 'out' ? 'alert-out' : 'alert-low'}">
          <span>${st === 'out' ? '🚨' : '⚠️'}</span>
          <div>
            <strong>${m.name}</strong> ${m.drug ? `(${m.drug})` : ''} — ${res ? res.name : ''}<br>
            <span style="font-size:13px">${st === 'out' ? 'Sin stock' : `Stock bajo: ${m.qty} ${m.unit} restantes`}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function getAlerts() { return medications.filter(m => getStatus(m) !== 'ok'); }

function getStatus(m) {
  if (m.qty <= 0) return 'out';
  if (m.minQty && m.qty <= m.minQty) return 'low';
  return 'ok';
}

        <table>
          <thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th></tr></thead>
          <tbody>${staff.map(u => `<tr>
            <td>${u.name}</td>
            <td><code>${u.user}</code></td>
            <td><span class="badge badge-role">${ROLE_LABELS[u.role]}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">👨‍👩‍👧 Familiares</div></div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Residente</th><th>Usuario familiar</th><th>Contraseña inicial</th></tr></thead>
          <tbody>${family.map(u => {
            const res = RESIDENTS.find(r => r.id === u.residentId);
            return `<tr>
              <td>${res ? res.name : '—'}</td>
              <td><code>${u.user}</code></td>
              <td><code>1234</code></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>

}

  showModal(`
    <div class="modal-title">💊 Agregar medicamento</div>
    <div class="grid-2">
      <div class="form-group"><label>Nombre comercial</label><input id="m-name" type="text" placeholder="Ej: Losartan"></div>
      <div class="form-group"><label>Droga / principio activo</label><input id="m-drug" type="text" placeholder="Ej: Losartán potásico"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Concentración</label><input id="m-conc" type="text" placeholder="Ej: 50mg"></div>
      <div class="form-group"><label>Unidad</label>
        <select id="m-unit">
          <option>comprimidos</option><option>cápsulas</option><option>ml</option><option>mg</option><option>gotas</option><option>parches</option><option>unidades</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Cantidad inicial</label><input id="m-qty" type="number" min="0" value="0"></div>
      <div class="form-group"><label>Stock mínimo (alerta)</label><input id="m-min" type="number" min="0" value="5"></div>
    </div>
    <div class="form-group"><label>Vencimiento</label><input id="m-exp" type="date"></div>
    <div class="form-group"><label>Observaciones</label><input id="m-obs" type="text" placeholder="Opcional"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMed(${residentId})">Guardar</button>
    </div>
  `);
}

function openAddMedGeneral() {
  showModal(`
    <div class="modal-title">💊 Agregar medicamento</div>
    <div class="form-group"><label>Residente</label>
      <select id="m-res">
        ${RESIDENTS.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
      </select>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Nombre comercial</label><input id="m-name" type="text" placeholder="Ej: Losartan"></div>
      <div class="form-group"><label>Droga</label><input id="m-drug" type="text" placeholder="Ej: Losartán potásico"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Concentración</label><input id="m-conc" type="text" placeholder="Ej: 50mg"></div>
      <div class="form-group"><label>Unidad</label>
        <select id="m-unit">
          <option>comprimidos</option><option>cápsulas</option><option>ml</option><option>mg</option><option>gotas</option><option>parches</option><option>unidades</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Cantidad inicial</label><input id="m-qty" type="number" min="0" value="0"></div>
      <div class="form-group"><label>Stock mínimo</label><input id="m-min" type="number" min="0" value="5"></div>
    </div>
    <div class="form-group"><label>Vencimiento</label><input id="m-exp" type="date"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMedGeneral()">Guardar</button>
    </div>
  `);
}

function saveMed(residentId) {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('El nombre es obligatorio'); return; }
  const med = {
    id: Date.now(),
    residentId,
    name,
    drug: document.getElementById('m-drug').value.trim(),
    concentration: document.getElementById('m-conc').value.trim(),
    unit: document.getElementById('m-unit').value,
    qty: parseInt(document.getElementById('m-qty').value) || 0,
    minQty: parseInt(document.getElementById('m-min').value) || 0,
    expiry: document.getElementById('m-exp').value || '',
    obs: document.getElementById('m-obs') ? document.getElementById('m-obs').value : '',
    addedBy: currentUser.name,
    addedDate: today()
  };
  medications.push(med);
  saveMeds();
  // Register movement
  if (med.qty > 0) {
    movements.push({ id: Date.now()+1, medId: med.id, medName: med.name, residentId, type: 'in', qty: med.qty, unit: med.unit, by: currentUser.name, date: today(), note: 'Stock inicial' });
    saveMovs();
  }
  closeModal();
  showToast('Medicamento agregado ✅');
  showResident(residentId);
}

function saveMedGeneral() {
  const residentId = parseInt(document.getElementById('m-res').value);
  document.getElementById('m-obs') || document.createElement('input');
  saveMed(residentId);
}

function deleteMed(id) {
  if (!confirm('¿Eliminar este medicamento?')) return;
  const med = medications.find(m => m.id === id);
  const rid = med ? med.residentId : null;
  medications = medications.filter(m => m.id !== id);
  saveMeds();
  showToast('Medicamento eliminado');
  if (rid) showResident(rid); else renderTab('medications');
}

// =====================================================
// MODALS: MOVEMENT
// =====================================================

function openMovement(medId, type) {
  const med = medications.find(m => m.id === medId);
  if (!med) return;
  showModal(`
    <div class="modal-title">${type === 'in' ? '⬆️ Entrada de stock' : '⬇️ Salida de stock'}</div>
    <p style="color:var(--text-muted);margin-bottom:20px;font-size:14px">
      <strong>${med.name}</strong> — Stock actual: ${med.qty} ${med.unit}
    </p>
    <div class="form-group"><label>Cantidad</label><input id="mov-qty" type="number" min="1" value="1"></div>
    <div class="form-group"><label>Observación (opcional)</label><input id="mov-note" type="text" placeholder="${type === 'in' ? 'Ej: Compra farmacia' : 'Ej: Administrado'}"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn ${type === 'in' ? 'btn-green' : 'btn-red'}" onclick="saveMovement(${medId}, '${type}')">Confirmar</button>
    </div>
  `);
}

function saveMovement(medId, type) {
  const qty = parseInt(document.getElementById('mov-qty').value) || 0;
  if (qty <= 0) { showToast('Ingresá una cantidad válida'); return; }
  const note = document.getElementById('mov-note').value.trim();
  const med = medications.find(m => m.id === medId);
  if (!med) return;
  if (type === 'out' && med.qty < qty) { showToast('No hay suficiente stock'); return; }
  med.qty = type === 'in' ? med.qty + qty : med.qty - qty;
  saveMeds();
  movements.push({ id: Date.now(), medId, medName: med.name, residentId: med.residentId, type, qty, unit: med.unit, by: currentUser.name, date: today(), note });
  saveMovs();
  closeModal();
  showToast(type === 'in' ? `+${qty} ${med.unit} agregados ✅` : `-${qty} ${med.unit} registrados ✅`);
  showResident(med.residentId);
}

// =====================================================
// MODAL HELPERS
// =====================================================

function showModal(html) {
  let ov = document.getElementById('modal-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'modal-overlay';
    ov.className = 'modal-overlay';
    ov.innerHTML = `<div class="modal" id="modal-box"></div>`;
    ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
    document.body.appendChild(ov);
  }
  document.getElementById('modal-box').innerHTML = html;
  ov.style.display = 'flex';
}

function closeModal() {
  const ov = document.getElementById('modal-overlay');
  if (ov) ov.style.display = 'none';
}

// =====================================================
// UTILS
// =====================================================

function today() {
  return new Date().toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}
</script>
