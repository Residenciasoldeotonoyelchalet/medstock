<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedStock - Residencia Sol de Otoño</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
#loginScreen{background:linear-gradient(135deg,#1e3a5f 0%,#2d6a9f 100%);align-items:center;justify-content:center;padding:2rem}
.login-box{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo .icon{font-size:48px}
.login-logo h1{font-size:22px;font-weight:700;color:#1e3a5f;margin-top:8px}
.login-logo p{font-size:13px;color:#718096;margin-top:4px}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:13px;font-weight:600;color:#4a5568;margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none}
.btn-primary{width:100%;padding:12px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:.5rem}
.login-roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.role-btn{padding:10px 8px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-size:13px;color:#4a5568}
.role-btn.selected{border-color:#2d6a9f;background:#ebf5fb;color:#1e3a5f;font-weight:600}
.role-btn span{display:block;font-size:22px;margin-bottom:4px}
.app-header{background:#1e3a5f;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header h2{font-size:17px;font-weight:600}
.app-header .subtitle{font-size:12px;opacity:.75;margin-top:2px}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer}
.bottom-nav{background:#fff;border-top:1px solid #e2e8f0;display:flex;position:sticky;bottom:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;border:none;background:none;color:#718096;font-size:11px;gap:3px}
.nav-item.active{color:#1e3a5f}
.nav-icon{font-size:22px}
.content{flex:1;padding:16px;overflow-y:auto;max-width:700px;width:100%;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #e2e8f0}
.card-title{font-size:15px;font-weight:600;color:#1a202c;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.med-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.med-icon{width:44px;height:44px;border-radius:10px;background:#ebf5fb;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.med-info{flex:1;min-width:0}
.med-name{font-size:15px;font-weight:600;color:#1a202c}
.med-detail{font-size:12px;color:#718096;margin-top:2px}
.med-qty{text-align:right;flex-shrink:0}
.qty-num{font-size:20px;font-weight:700;color:#1e3a5f}
.qty-unit{font-size:11px;color:#718096;display:block}
.stock-badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-top:4px}
.badge-ok{background:#e6f4ea;color:#1e7e34}
.badge-low{background:#fff3cd;color:#856404}
.badge-out{background:#fce8e8;color:#a32d2d}
.progress-bar{height:4px;background:#e2e8f0;border-radius:4px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px}
.fill-ok{background:#34a853}
.fill-low{background:#fbbc04}
.fill-out{background:#ea4335}
.resident-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;background:#1e3a5f;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.summary-card{background:#ebf5fb;border-radius:10px;padding:14px;text-align:center}
.summary-num{font-size:28px;font-weight:700;color:#1e3a5f}
.summary-label{font-size:12px;color:#4a5568;margin-top:4px}
.alert-item{background:#fff;border-left:4px solid #fbbc04;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:10px;display:flex;gap:10px}
.alert-icon{font-size:20px;flex-shrink:0}
.alert-sub{font-size:12px;color:#718096;margin-top:2px}
.field-label{font-size:13px;font-weight:600;color:#4a5568;margin-bottom:5px}
.field-input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none}
.btn-add{background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-secondary{background:#ebf5fb;color:#1e3a5f;border:1px solid #2d6a9f;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.single{grid-template-columns:1fr}
.section-title{font-size:13px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.search-bar{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px;background:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:17px;font-weight:700}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#718096}
.op-row{display:flex;gap:8px;margin-bottom:12px}
.op-btn{flex:1;padding:9px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#4a5568}
.op-btn.active{border-color:#2d6a9f;background:#ebf5fb;color:#1e3a5f}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:300;display:none;white-space:nowrap}
.toast.show{display:block}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">💊</div>
      <h1>MedStock</h1>
      <p>Residencia Sol de Otoño</p>
    </div>
    <div class="section-title" style="text-align:center;margin-bottom:10px">Ingresá como</div>
    <div class="login-roles">
      <div class="role-btn selected" onclick="selectRole('familiar')" id="rol-familiar"><span>👨‍👩‍👧</span>Familiar</div>
      <div class="role-btn" onclick="selectRole('staff')" id="rol-staff"><span>👩‍⚕️</span>Personal</div>
    </div>
    <div class="form-group">
      <label>Residente</label>
      <select id="loginResidente">
        <option value="">Seleccioná un residente...</option>
        <option value="0">García, María Elena</option>
        <option value="1">Rodríguez, Juan Carlos</option>
        <option value="2">López, Ana Rosa</option>
      </select>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••" value="1234">
    </div>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div id="appScreen" class="screen">
  <div class="app-header">
    <div>
      <h2 id="headerTitle">MedStock</h2>
      <div class="subtitle" id="headerSub">Residencia Sol de Otoño</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Salir</button>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>

<div class="modal-overlay" id="modalAgregar">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">➕ Cargar medicamento</span>
      <button class="close-btn" onclick="closeModal('modalAgregar')">✕</button>
    </div>
    <div class="form-row">
      <div><div class="field-label">Residente</div>
        <select class="field-input" id="fResidente">
          <option value="0">García, María Elena</option>
          <option value="1">Rodríguez, Juan Carlos</option>
          <option value="2">López, Ana Rosa</option>
        </select>
      </div>
      <div><div class="field-label">Tipo</div>
        <select class="field-input" id="fTipo">
          <option>Medicamento</option><option>Insumo</option><option>Suplemento</option>
        </select>
      </div>
    </div>
    <div class="form-row single"><div>
      <div class="field-label">Nombre comercial</div>
      <input class="field-input" id="fNombre" placeholder="Ej: Atenolol">
    </div></div>
    <div class="form-row">
      <div><div class="field-label">Droga / Principio activo</div>
        <input class="field-input" id="fDroga" placeholder="Ej: Atenolol">
      </div>
      <div><div class="field-label">Concentración</div>
        <input class="field-input" id="fDosis" placeholder="Ej: 50 mg">
      </div>
    </div>
    <div class="form-row">
      <div><div class="field-label">Cantidad</div>
        <input class="field-input" type="number" id="fCantidad" min="0" placeholder="0">
      </div>
      <div><div class="field-label">Unidad</div>
        <select class="field-input" id="fUnidad">
          <option>comprimidos</option><option>cápsulas</option><option>ml</option>
          <option>frascos</option><option>ampollas</option><option>parches</option><option>unidades</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><div class="field-label">Stock mínimo (alerta)</div>
        <input class="field-input" type="number" id="fMinimo" min="0" placeholder="Ej: 10">
      </div>
      <div><div class="field-label">Vencimiento</div>
        <input class="field-input" type="date" id="fVence">
      </div>
    </div>
    <button class="btn-add" onclick="guardarMed()">Guardar medicamento</button>
  </div>
</div>

<div class="modal-overlay" id="modalEditar">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="editTitulo">Actualizar stock</span>
      <button class="close-btn" onclick="closeModal('modalEditar')">✕</button>
    </div>
    <div class="op-row">
      <button class="op-btn active" id="opSumar" onclick="setOp('sumar')">➕ Sumar</button>
      <button class="op-btn" id="opRestar" onclick="setOp('restar')">➖ Restar</button>
      <button class="op-btn" id="opSetear" onclick="setOp('setear')">✏️ Fijar</button>
    </div>
    <div class="form-row single"><div>
      <div class="field-label" id="editLabel">Cantidad a sumar</div>
      <input class="field-input" type="number" id="editCantidad" min="0" value="1" oninput="updatePreview()">
    </div></div>
    <div style="font-size:13px;color:#718096;margin-bottom:12px" id="editPreview"></div>
    <button class="btn-add" onclick="confirmarEdit()">Confirmar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var S={
  rol:'familiar', residente:null, tab:'stock', editIdx:null, editOp:'sumar',
  residentes:[
    {nombre:'García, María Elena',edad:78,habitacion:'101'},
    {nombre:'Rodríguez, Juan Carlos',edad:82,habitacion:'204'},
    {nombre:'López, Ana Rosa',edad:75,habitacion:'312'}
  ],
  meds:[
    {res:0,nombre:'Atenolol',droga:'Atenolol',dosis:'50 mg',tipo:'Medicamento',cantidad:30,minimo:10,unidad:'comprimidos',vence:'2025-12-01',emoji:'❤️'},
    {res:0,nombre:'Metformina',droga:'Metformina HCl',dosis:'850 mg',tipo:'Medicamento',cantidad:8,minimo:15,unidad:'comprimidos',vence:'2025-09-15',emoji:'💊'},
    {res:0,nombre:'Pañales talla G',droga:'-',dosis:'-',tipo:'Insumo',cantidad:0,minimo:5,unidad:'unidades',vence:'',emoji:'🧻'},
    {res:1,nombre:'Losartan',droga:'Losartan potásico',dosis:'100 mg',tipo:'Medicamento',cantidad:45,minimo:10,unidad:'comprimidos',vence:'2026-03-01',emoji:'💊'},
    {res:1,nombre:'Omeprazol',droga:'Omeprazol',dosis:'20 mg',tipo:'Medicamento',cantidad:6,minimo:10,unidad:'cápsulas',vence:'2025-11-01',emoji:'💊'},
    {res:2,nombre:'Calcio + Vit D',droga:'Calcio carbonato',dosis:'600 mg',tipo:'Suplemento',cantidad:60,minimo:15,unidad:'comprimidos',vence:'2026-06-01',emoji:'🦴'},
    {res:2,nombre:'Paracetamol',droga:'Paracetamol',dosis:'500 mg',tipo:'Medicamento',cantidad:20,minimo:10,unidad:'comprimidos',vence:'2025-10-01',emoji:'💊'}
  ]
};

function selectRole(r){
  S.rol=r;
  document.querySelectorAll('.role-btn').forEach(function(b){b.classList.remove('selected')});
  document.getElementById('rol-'+r).classList.add('selected');
}

function doLogin(){
  var res=document.getElementById('loginResidente').value;
  var pass=document.getElementById('loginPass').value;
  if(S.rol==='familiar'&&!res){showToast('Seleccioná un residente');return}
  if(!pass){showToast('Ingresá la contraseña');return}
  S.residente=S.rol==='familiar'?parseInt(res):null;
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  buildNav();
  showTab('stock');
}

function doLogout(){
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
}

function buildNav(){
  var tabs=[
    {id:'stock',icon:'📦',label:'Stock'},
    {id:'alertas',icon:'🔔',label:'Alertas'},
    {id:'agregar',icon:'➕',label:'Cargar'},
    {id:'historial',icon:'📋',label:'Registros'}
  ];
  if(S.rol==='staff') tabs.push({id:'residentes',icon:'👥',label:'Residentes'});
  document.getElementById('bottomNav').innerHTML=tabs.map(function(t){
    return '<button class="nav-item" id="nav-'+t.id+'" onclick="showTab(\''+t.id+'\')"><span class="nav-icon">'+t.icon+'</span>'+t.label+'</button>';
  }).join('');
}

function showTab(tab){
  S.tab=tab;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
  var nb=document.getElementById('nav-'+tab);
  if(nb) nb.classList.add('active');
  if(tab==='agregar'){openModal('modalAgregar');return}
  var titles={stock:'Stock de Medicamentos',alertas:'Alertas',historial:'Registros',residentes:'Residentes'};
  document.getElementById('headerTitle').textContent=titles[tab]||'MedStock';
  var c=document.getElementById('mainContent');
  if(tab==='stock') c.innerHTML=renderStock();
  else if(tab==='alertas') c.innerHTML=renderAlertas();
  else if(tab==='historial') c.innerHTML=renderHistorial();
  else if(tab==='residentes') c.innerHTML=renderResidentes();
}

function getMeds(){
  return S.residente!==null?S.meds.filter(function(m){return m.res===S.residente}):S.meds;
}

function level(m){return m.cantidad===0?'out':m.cantidad<=m.minimo?'low':'ok'}
function badge(l){return l==='ok'?'<span class="stock-badge badge-ok">OK</span>':l==='low'?'<span class="stock-badge badge-low">⚠️ Bajo</span>':'<span class="stock-badge badge-out">❌ Sin stock</span>'}

function renderStock(){
  var meds=getMeds();
  var html='<input class="search-bar" placeholder="🔍 Buscar..." oninput="filterStock(this.value)">';
  if(!meds.length) return html+'<div style="text-align:center;padding:40px;color:#718096">No hay medicamentos. Usá ➕ Cargar.</div>';
  html+='<div id="medList">';
  meds.forEach(function(m){
    var idx=S.meds.indexOf(m);
    var lv=level(m);
    var pct=m.minimo>0?Math.min(100,Math.round(m.cantidad/m.minimo*100)):100;
    var fc=lv==='ok'?'fill-ok':lv==='low'?'fill-low':'fill-out';
    var resLabel=S.rol==='staff'?'<div class="med-detail">'+S.residentes[m.res].nombre+'</div>':'';
    html+='<div class="med-item">'
      +'<div class="med-icon">'+m.emoji+'</div>'
      +'<div class="med-info"><div class="med-name">'+m.nombre+'</div>'
        +'<div class="med-detail">'+m.droga+(m.dosis&&m.dosis!=='-'?' · '+m.dosis:'')+'</div>'
        +resLabel
        +'<div class="progress-bar"><div class="progress-fill '+fc+'" style="width:'+pct+'%"></div></div>'
        +badge(lv)+'</div>'
      +'<div class="med-qty"><div class="qty-num">'+m.cantidad+'</div>'
        +'<span class="qty-unit">'+m.unidad+'</span>'
        +'<div style="margin-top:6px"><button class="btn-secondary" onclick="openEdit('+idx+')">Actualizar</button></div>'
      +'</div></div>';
  });
  return html+'</div>';
}

function filterStock(v){
  document.querySelectorAll('.med-item').forEach(function(el){
    el.style.display=el.textContent.toLowerCase().includes(v.toLowerCase())?'flex':'none';
  });
}

function renderAlertas(){
  var alertas=getMeds().filter(function(m){return level(m)!=='ok'});
  if(!alertas.length) return '<div style="text-align:center;padding:40px 0"><div style="font-size:48px">✅</div><div style="font-weight:600;color:#1e7e34;margin-top:12px">Todo en orden</div><div style="color:#718096;font-size:14px;margin-top:6px">No hay alertas de stock.</div></div>';
  var html='<div class="card"><div class="card-title">⚠️ Requieren atención ('+alertas.length+')</div>';
  alertas.forEach(function(m){
    var lv=level(m);
    var bc=lv==='out'?'#ea4335':'#fbbc04';
    html+='<div class="alert-item" style="border-left-color:'+bc+'">'
      +'<div class="alert-icon">'+(lv==='out'?'❌':'⚠️')+'</div>'
      +'<div><strong>'+m.nombre+'</strong>'+(m.dosis&&m.dosis!=='-'?' ('+m.dosis+')':'')
        +'<div class="alert-sub">Quedan: '+m.cantidad+' '+m.unidad+' · Mínimo: '+m.minimo
        +(S.rol==='staff'?' · '+S.residentes[m.res].nombre:'')+'</div></div></div>';
  });
  return html+'</div>';
}

function renderHistorial(){
  var meds=getMeds();
  var html='<div class="card"><div class="card-title">📋 Inventario actual</div>';
  meds.forEach(function(m){
    var lv=level(m);
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f4f8">'
      +'<div><div style="font-size:14px;font-weight:500">'+m.emoji+' '+m.nombre+'</div>'
        +'<div style="font-size:12px;color:#718096">'+m.dosis+(m.vence?' · Vence: '+m.vence:'')+'</div></div>'
      +'<div style="text-align:right"><div style="font-weight:700;color:#1e3a5f">'+m.cantidad+' '+m.unidad+'</div>'
        +badge(lv)+'</div></div>';
  });
  return html+'</div>';
}

function renderResidentes(){
  var alertasTotal=S.meds.filter(function(m){return level(m)!=='ok'}).length;
  var html='<div class="summary-grid">'
    +'<div class="summary-card"><div class="summary-num">'+S.residentes.length+'</div><div class="summary-label">Residentes</div></div>'
    +'<div class="summary-card"><div class="summary-num">'+alertasTotal+'</div><div class="summary-label">Alertas activas</div></div>'
    +'</div>';
  S.residentes.forEach(function(r,i){
    var meds=S.meds.filter(function(m){return m.res===i});
    var al=meds.filter(function(m){return level(m)!=='ok'}).length;
    var ini=r.nombre.split(',')[0].substring(0,2).toUpperCase();
    html+='<div class="resident-card" onclick="verResidente('+i+')">'
      +'<div class="avatar">'+ini+'</div>'
      +'<div style="flex:1"><div style="font-size:15px;font-weight:600">'+r.nombre+'</div>'
        +'<div style="font-size:12px;color:#718096">'+r.edad+' años · Hab. '+r.habitacion+'</div>'
        +'<div style="font-size:12px;color:#2d6a9f;font-weight:600">'+meds.length+' medicamentos'+(al>0?' · ⚠️ '+al+' alertas':'')+'</div>'
      +'</div><div style="font-size:20px;color:#718096">›</div></div>';
  });
  return html;
}

function verResidente(i){
  S.residente=i;
  document.getElementById('headerTitle').textContent=S.residentes[i].nombre;
  document.getElementById('mainContent').innerHTML=renderStock();
  S.tab='stock';
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
  document.getElementById('nav-stock').classList.add('active');
}

function openEdit(idx){
  S.editIdx=idx;S.editOp='sumar';
  document.getElementById('editTitulo').textContent='✏️ '+S.meds[idx].nombre;
  document.getElementById('editCantidad').value=1;
  ['sumar','restar','setear'].forEach(function(o){document.getElementById('op'+o.charAt(0).toUpperCase()+o.slice(1)).classList.toggle('active',o==='sumar')});
  document.getElementById('editLabel').textContent='Cantidad a sumar';
  updatePreview();
  openModal('modalEditar');
}

function setOp(op){
  S.editOp=op;
  ['sumar','restar','setear'].forEach(function(o){
    document.getElementById('op'+o.charAt(0).toUpperCase()+o.slice(1)).classList.toggle('active',o===op);
  });
  var labels={sumar:'Cantidad a sumar',restar:'Cantidad a descontar',setear:'Nuevo total'};
  document.getElementById('editLabel').textContent=labels[op];
  updatePreview();
}

function updatePreview(){
  if(S.editIdx===null) return;
  var m=S.meds[S.editIdx];
  var val=parseInt(document.getElementById('editCantidad').value)||0;
  var nuevo=S.editOp==='sumar'?m.cantidad+val:S.editOp==='restar'?Math.max(0,m.cantidad-val):val;
  document.getElementById('editPreview').textContent='Stock actual: '+m.cantidad+' → Nuevo: '+nuevo+' '+m.unidad;
}

function confirmarEdit(){
  var m=S.meds[S.editIdx];
  var val=parseInt(document.getElementById('editCantidad').value)||0;
  if(S.editOp==='sumar') m.cantidad+=val;
  else if(S.editOp==='restar') m.cantidad=Math.max(0,m.cantidad-val);
  else m.cantidad=val;
  closeModal('modalEditar');
  showTab(S.tab);
  showToast('Stock actualizado');
}

function guardarMed(){
  var nombre=document.getElementById('fNombre').value.trim();
  if(!nombre){showToast('Ingresá el nombre');return}
  var tipo=document.getElementById('fTipo').value;
  var emojis={Medicamento:'💊',Insumo:'🧻',Suplemento:'🌿'};
  S.meds.push({
    res:parseInt(document.getElementById('fResidente').value),
    nombre:nombre,
    droga:document.getElementById('fDroga').value.trim()||'-',
    dosis:document.getElementById('fDosis').value.trim()||'-',
    tipo:tipo,
    cantidad:parseInt(document.getElementById('fCantidad').value)||0,
    minimo:parseInt(document.getElementById('fMinimo').value)||5,
    unidad:document.getElementById('fUnidad').value,
    vence:document.getElementById('fVence').value,
    emoji:emojis[tipo]||'💊'
  });
  ['fNombre','fDroga','fDosis','fCantidad','fMinimo','fVence'].forEach(function(id){document.getElementById(id).value=''});
  closeModal('modalAgregar');
  showTab('stock');
  showToast('Medicamento cargado');
}

function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  if(id==='modalAgregar') showTab(S.tab==='agregar'?'stock':S.tab);
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

document.querySelectorAll('.modal-overlay').forEach(function(el){
  el.addEventListener('click',function(e){if(e.target===el)closeModal(el.id)});
});
</script>
</body>
</html>
