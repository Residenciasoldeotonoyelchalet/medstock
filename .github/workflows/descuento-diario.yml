name: Descuento Diario de Medicación

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  descuento:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install firebase-admin

      - name: Ejecutar descuento diario
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/scripts/descuento-diario.js
